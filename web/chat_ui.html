<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether-Core Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-primary: #66fcf1;
            --accent-secondary: #45a29e;
            --text-light: #c5c6c7;
            --text-bright: #ffffff;
            --glass-bg: rgba(31, 40, 51, 0.65);
            --glass-border: rgba(102, 252, 241, 0.15);
            --transition-smooth: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --danger: #ff5722;
            --success: #00e676;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(102, 252, 241, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(69, 162, 158, 0.08), transparent 25%),
                        var(--bg-color);
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 12, 16, 0.4);
        }

        .header-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-bright);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--accent-primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-primary);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Settings Button */
        .settings-icon {
            cursor: pointer;
            width: 24px;
            height: 24px;
            fill: var(--accent-secondary);
            transition: var(--transition-smooth);
        }
        .settings-icon:hover {
            fill: var(--accent-primary);
            transform: rotate(45deg);
        }

        .chat-history {
            flex-grow: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-track { background: transparent; }
        .chat-history::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 16px 24px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            animation: messageSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .system-msg {
            align-self: center;
            background: rgba(69, 162, 158, 0.1);
            color: var(--accent-secondary);
            font-size: 0.85rem;
            border-radius: 20px;
            padding: 8px 16px;
            border: 1px solid rgba(69, 162, 158, 0.2);
            text-align: center;
            max-width: 90%;
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(31, 40, 51, 0.9), rgba(11, 12, 16, 0.9));
            color: var(--text-bright);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(102, 252, 241, 0.05);
            color: var(--text-light);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message-metrics {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(102, 252, 241, 0.1);
            display: flex;
            gap: 12px;
            font-size: 0.7rem;
            color: var(--accent-secondary);
            opacity: 0.7;
            font-family: 'Outfit';
        }
        .metric-item { display: flex; align-items: center; gap: 4px; }
        .metric-value { color: var(--accent-primary); font-weight: 600; }

        .ai-msg strong { color: var(--text-bright); font-family: 'Outfit', sans-serif; font-weight: 500; }

        .input-area {
            padding: 24px 32px;
            background: rgba(31, 40, 51, 0.8);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .textarea-wrapper {
            flex-grow: 1;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-smooth);
        }
        .textarea-wrapper:focus-within { border-color: rgba(102, 252, 241, 0.4); box-shadow: 0 0 15px rgba(102, 252, 241, 0.1); }

        textarea {
            width: 100%;
            min-height: 54px;
            max-height: 150px;
            background: transparent;
            border: none;
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            padding: 16px 20px;
            resize: none;
            outline: none;
        }

        button.send-btn {
            height: 54px;
            width: 54px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: var(--bg-color);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.2);
        }
        button.send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 252, 241, 0.4); }

        .typing-indicator { display: none; align-items: center; gap: 4px; padding: 12px 20px; background: transparent; }
        .dot { width: 6px; height: 6px; background: var(--accent-primary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        /* Modal / Settings Overlay */
        .modal-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: rgba(11, 12, 16, 0.9);
            border: 1px solid var(--accent-secondary);
            border-radius: 16px; padding: 32px; width: 80%; max-width: 400px;
            color: var(--text-light); box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        .modal-content h2 { color: var(--text-bright); margin-bottom: 24px; font-family: 'Outfit'; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--accent-secondary); }
        .form-group input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white; font-family: 'Inter'; 
        }
        .modal-btn {
            background: var(--accent-secondary); border: none; padding: 10px 16px; border-radius: 8px;
            color: #0b0c10; font-weight: 600; cursor: pointer; transition: 0.2s; margin-right: 8px;
        }
        .modal-btn:hover { background: var(--accent-primary); }
        .close-btn { background: transparent; color: var(--text-light); border: 1px solid var(--text-light); }

        /* Training Badge */
        .status-badge {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(255, 87, 34, 0.15);
            border: 1px solid rgba(255, 87, 34, 0.3);
            color: #ff8a65;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'Outfit';
            text-transform: uppercase;
            letter-spacing: 0.05em;
            animation: fadeIn 0.5s ease-out;
        }
        .status-badge.active { display: flex; }
        .training-pulse {
            width: 6px; height: 6px; background: #ff5722; border-radius: 50%;
            box-shadow: 0 0 8px #ff5722;
            animation: pulseMini 1s infinite alternate;
        }
        @keyframes pulseMini { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <div class="status-indicator" id="status-dot"></div>
                Aether-Core
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="status-badge" id="training-badge">
                    <div class="training-pulse"></div>
                    <span>Distilling Knowledge...</span>
                </div>
                <div style="font-size: 0.8rem; color: var(--accent-secondary); opacity: 0.8; font-family: 'Outfit';">Neural-Engine</div>
            <svg class="settings-icon" id="settings-trigger" viewBox="0 0 24 24">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
            </div>
        </div>

        <div class="chat-history" id="chat-history">
            <div class="message system-msg">
                Willkommen bei Aether-Core. Das lokale, ressourcenschonende Modell ist bereit.
            </div>
        </div>

        <div class="input-area">
            <div class="textarea-wrapper">
                <textarea id="user-input" placeholder="Nachricht an Aether senden..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="send-btn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settings-modal">
            <div class="modal-content">
                <h2>System Einstellungen</h2>
                
                <div class="form-group">
                    <label>DeepSeek API Key (Teacher)</label>
                    <input type="password" id="api-key-input" placeholder="sk-...">
                </div>
                <div style="display:flex; justify-content:flex-end; margin-bottom:24px;">
                    <button class="modal-btn" onclick="saveApiKey()">Key speichern</button>
                </div>

                <div class="form-group" style="padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1)">
                    <label>Knowledge Distillation (Training)</label>
                    <input type="number" id="epochs-input" value="60" placeholder="Epochen (z.B. 60)">
                </div>
                <div style="display:flex; justify-content:space-between">
                    <button class="modal-btn close-btn" onclick="closeSettings()">Schließen</button>
                    <button class="modal-btn" style="background:#ff5722; color:white" onclick="startTraining()">Trainer starten</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        const settingsModal = document.getElementById('settings-modal');
        let messageHistory = [];
        
        userInput.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
            if (this.value === '') this.style.height = '54px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        sendBtn.addEventListener('click', sendMessage);

        document.getElementById('settings-trigger').addEventListener('click', () => { settingsModal.style.display = 'flex'; });
        function closeSettings() { settingsModal.style.display = 'none'; }

        function addMessage(text, type, metrics = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + type;
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            msgDiv.innerHTML = formattedText;
            
            if(metrics && type === 'ai-msg') {
                const metricsDiv = document.createElement('div');
                metricsDiv.className = 'message-metrics';
                metricsDiv.innerHTML = `
                    <div class="metric-item">Speed: <span class="metric-value">${metrics.tps} t/s</span></div>
                    <div class="metric-item">Time: <span class="metric-value">${metrics.ms}ms</span></div>
                `;
                msgDiv.appendChild(metricsDiv);
            }

            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message ai-msg typing-indicator';
            div.id = 'typing-indicator';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            div.style.display = 'flex';
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function removeTypingIndicator() {
            const ind = document.getElementById('typing-indicator');
            if (ind) ind.remove();
        }

        async function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            if(!key) return;
            try {
                const res = await fetch('http://127.0.0.1:8444/v1/settings/apikey', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: key })
                });
                if(res.ok) addMessage("API Key für DeepSeek-Teacher wurde gesetzt.", "system-msg");
            } catch(e) { alert("API Fehler"); }
        }

        async function startTraining() {
            const epochs = parseInt(document.getElementById('epochs-input').value || '60');
            closeSettings();
            addMessage(`Starte Knowledge Distillation im Hintergrund (${epochs} Epochen)...`, "system-msg");
            document.getElementById('training-badge').classList.add('active');
            try {
                await fetch('http://127.0.0.1:8444/v1/train/distill', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ epochs: epochs })
                });
            } catch(e) { console.error(e); }
        }

        async function pollStatus() {
            try {
                const res = await fetch('http://127.0.0.1:8444/v1/system/status');
                const data = await res.json();
                const badge = document.getElementById('training-badge');
                if(data.is_training) {
                    badge.classList.add('active');
                } else {
                    badge.classList.remove('active');
                }
            } catch(e) { }
        }
        setInterval(pollStatus, 5000);
        pollStatus();

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = ''; userInput.style.height = '54px';
            addMessage(text, 'user-msg');
            messageHistory.push({ role: "user", content: text });
            addTypingIndicator();
            
            // UI Feedback for On-Demand Learning 
            statusDot.style.animation = 'pulse 0.5s infinite alternate';
            statusDot.style.backgroundColor = '#ff5722';
            statusDot.style.boxShadow = '0 0 12px #ff5722';

            try {
                const response = await fetch('http://127.0.0.1:8444/v1/chat/completions', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "aether-core", messages: messageHistory, max_tokens: 300, temperature: 0.7 })
                });
                if (!response.ok) throw new Error("API Fehler");
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                const metrics = data.usage ? { tps: data.usage.tokens_per_second, ms: data.usage.elapsed_ms } : null;
                
                removeTypingIndicator();
                addMessage(aiResponse, 'ai-msg', metrics);
                messageHistory.push({ role: "assistant", content: aiResponse });
            } catch (err) {
                removeTypingIndicator();
                addMessage("Fehler: Verbindung zur Aether-Core Engine unterbrochen.", "system-msg");
            } finally {
                statusDot.style.animation = 'pulse 2s infinite ease-in-out';
                statusDot.style.backgroundColor = 'var(--accent-primary)';
                statusDot.style.boxShadow = '0 0 12px var(--accent-primary)';
            }
        }
    </script>
</body>
</html>
