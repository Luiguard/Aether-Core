compression:
  compression_ratio: 6
  latent_dim: 128
  use_vae: true
deepspeed:
  config_path: ds_config.json
  enabled: false
device: cpu
ingest:
  auto_update_graph: true
  source_dir: source_docs/
  supported_extensions:
  - .pdf
  - .md
  - .txt
mixed_precision: true
mode: api
neural:
  d_model: 768
  max_seq_len: 2048
  moe:
    aux_loss_coef: 0.01
    n_experts: 8
    top_k: 2
  n_heads: 12
  n_layers: 8
  vocab_size: 2048
project_name: Aether-Core-Hybrid
scaling:
  preset: nano
security:
  allow_self_update: true
  min_toxicity_threshold: 0.7
  redlist_active: true
seed: 42
symbolic:
  entities_per_query: 5
  graph_path: aether_core/data/ki_architektur.json
  safe_mode: true
  use_rules: true
training:
  batch_size: 16
  epochs: 10
  learning_rate: 0.0001
  log_dir: logs/
  output_dir: checkpoints/
  save_every: 500
version: 1.0.0
vram_gb: 12.0
