<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether-Core Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-primary: #66fcf1;
            --accent-secondary: #45a29e;
            --text-light: #c5c6c7;
            --text-bright: #ffffff;
            --glass-bg: rgba(31, 40, 51, 0.7);
            --glass-border: rgba(102, 252, 241, 0.15);
            --transition-smooth: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --danger: #ff5722;
            --success: #00e676;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(102, 252, 241, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(69, 162, 158, 0.08), transparent 25%),
                        var(--bg-color);
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 12, 16, 0.5);
        }

        .header-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px; height: 8px; background: var(--accent-primary);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent-primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(0.9); }
        }

        .status-badge {
            display: none; align-items: center; gap: 8px;
            background: rgba(255, 87, 34, 0.15); border: 1px solid rgba(255, 87, 34, 0.3);
            color: #ff8a65; padding: 4px 12px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 600; font-family: 'Outfit';
            text-transform: uppercase; animation: fadeIn 0.5s ease-out;
        }
        .status-badge.active { display: flex; }

        .chat-history {
            flex: 1; padding: 32px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 24px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%; padding: 16px 24px; border-radius: 18px;
            line-height: 1.6; font-size: 0.95rem; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end; background: rgba(102, 252, 241, 0.1);
            color: var(--text-bright); border: 1px solid rgba(102, 252, 241, 0.2);
            border-bottom-right-radius: 4px;
        }
        .ai-msg {
            align-self: flex-start; background: rgba(255, 255, 255, 0.03);
            color: var(--text-light); border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }
        .system-msg {
            align-self: center; background: rgba(69, 162, 158, 0.1);
            color: var(--accent-secondary); font-size: 0.8rem;
            padding: 6px 16px; border-radius: 20px;
        }

        .message-metrics {
            margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; gap: 12px; font-size: 0.7rem; color: var(--accent-secondary);
        }
        .metric-value { color: var(--accent-primary); font-weight: 600; }

        /* Quick Actions */
        .quick-actions {
            display: flex; gap: 10px; padding: 12px 32px; flex-wrap: wrap;
            border-top: 1px solid var(--glass-border);
        }
        .action-chip {
            padding: 6px 14px; background: rgba(102, 252, 241, 0.05);
            border: 1px solid var(--glass-border); border-radius: 16px;
            font-size: 0.75rem; color: var(--accent-secondary); cursor: pointer;
            transition: var(--transition-smooth); font-family: 'Outfit';
        }
        .action-chip:hover {
            background: rgba(102, 252, 241, 0.15); border-color: var(--accent-primary);
            color: var(--accent-primary); transform: translateY(-2px);
        }

        .input-area {
            padding: 24px 32px; background: rgba(11, 12, 16, 0.4);
            display: flex; gap: 16px; align-items: center;
        }
        input[type="text"] {
            flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 14px 20px; color: white; outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent-primary); background: rgba(255,255,255,0.06); }

        .send-btn {
            background: var(--accent-primary); border: none; width: 48px; height: 48px;
            border-radius: 14px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent-primary); }

        /* Training Pulse Icon */
        .training-pulse { width: 6px; height: 6px; background: #ff5722; border-radius: 50%; box-shadow: 0 0 8px #ff5722; animation: pulseMini 1s infinite alternate; }
        @keyframes pulseMini { from { opacity: 0.4; } to { opacity: 1; } }

        .settings-icon { cursor: pointer; fill: var(--accent-secondary); transition: 0.3s; }
        .settings-icon:hover { fill: var(--accent-primary); transform: rotate(45deg); }

        /* Modal */
        .modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #1f2833; padding: 32px; border-radius: 20px; border: 1px solid var(--glass-border); width: 80%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <div class="status-dot" id="status-dot"></div>
                Aether-Core
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="status-badge" id="training-badge">
                    <div class="training-pulse"></div>
                    <span>Distilling Knowledge...</span>
                </div>
                <svg class="settings-icon" id="settings-trigger" width="24" height="24" viewBox="0 0 24 24">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
            </div>
        </div>

        <div class="chat-history" id="chat-history">
            <div class="message system-msg">
                Willkommen bei Aether-Core. Das System ist bereit für Ihre Fragen.
            </div>
        </div>

        <div class="quick-actions">
            <div class="action-chip" onclick="quickSend('Wer bist du?')">Wer bist du?</div>
            <div class="action-chip" onclick="quickSend('Erkläre Aether-Core')">System erklären</div>
            <div class="action-chip" onclick="quickSend('Wissens-Entdeckung starten')">Expansion starten</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Frage an Aether senden...">
            <button class="send-btn" id="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>

        <!-- Modal -->
        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <h3 style="margin-bottom: 20px; color: white">Einstellungen</h3>
                <div style="margin-bottom: 15px">
                    <label style="font-size: 0.8rem">DeepSeek API Key</label>
                    <input type="password" id="api-key-input" style="width: 100%; margin-top: 5px; padding: 8px; background: #0b0c10; border: 1px solid #45a29e; color: white">
                </div>
                <div style="display: flex; justify-content: space-between">
                    <button onclick="closeSettings()" style="padding: 8px 16px; background: transparent; color: #c5c6c7; border: 1px solid #c5c6c7; cursor: pointer">Abbrechen</button>
                    <button onclick="saveApiKey()" style="padding: 8px 16px; background: #45a29e; color: #0b0c10; border: none; cursor: pointer">Speichern</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const badge = document.getElementById('training-badge');
        const modal = document.getElementById('settings-modal');
        let history = [];

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        sendBtn.addEventListener('click', sendMessage);
        document.getElementById('settings-trigger').addEventListener('click', () => modal.style.display = 'flex');

        function closeSettings() { modal.style.display = 'none'; }

        async function quickSend(text) { userInput.value = text; sendMessage(); }

        function addMessage(text, type, metrics = null) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            let fmt = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            div.innerHTML = fmt;

            if(metrics && type === 'ai-msg') {
                const met = document.createElement('div');
                met.className = 'message-metrics';
                met.innerHTML = `<div class="metric-item">Speed: <span class="metric-value">${metrics.tps} t/s</span></div><div class="metric-item">Time: <span class="metric-value">${metrics.ms}ms</span></div>`;
                div.appendChild(met);
            }

            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if(!text) return;
            userInput.value = '';
            addMessage(text, 'user-msg');
            history.push({role: "user", content: text});

            try {
                const res = await fetch('http://127.0.0.1:8444/v1/chat/completions', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: history})
                });
                const data = await res.json();
                const aiMsg = data.choices[0].message.content;
                const metrics = data.usage ? {tps: data.usage.tokens_per_second, ms: data.usage.elapsed_ms} : null;
                addMessage(aiMsg, 'ai-msg', metrics);
                history.push({role: "assistant", content: aiMsg});
            } catch(e) {
                addMessage("Fehler: API nicht erreichbar.", "system-msg");
            }
        }

        async function pollStatus() {
            try {
                const res = await fetch('http://127.0.0.1:8444/v1/system/status');
                const data = await res.json();
                if(data.is_training) badge.classList.add('active');
                else badge.classList.remove('active');
            } catch(e){}
        }
        setInterval(pollStatus, 4000);

        async function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            await fetch('http://127.0.0.1:8444/v1/settings/apikey', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({api_key: key})
            });
            closeSettings();
            addMessage("API-Key permanent gespeichert.", "system-msg");
        }
    </script>
</body>
</html>
